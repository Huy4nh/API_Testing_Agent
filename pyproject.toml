[project]
name = "notify_sender_bot"
version = "0.1.0"
description = ""
readme = "README.md"
authors = [
    { name = "Huy4nh" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "pydantic-settings>=2.13.1,<3.0.0",
    "aiogram>=3.26.0,<4.0.0",
    "telethon>=1.42.0,<2.0.0",
    "pydantic>=2.12.5,<3.0.0",
    "sqlalchemy>=2.0.48,<3.0.0",
    "asyncpg>=0.31.0,<1.0.0",
    "alembic>=1.18.4,<2.0.0",
    "redis>=7.3.0,<8.0.0",
    "celery>=5.6.2,<6.0.0"
]

[project.scripts]
notify_sender_bot = "app.main:main"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "ruff>=0.15.4,<0.16.0",
    "pyright>=1.1.408,<2.0.0",
    "pytest>=9.0.2,<10.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0"
]

[tool.poetry]
packages = [
    { include = "app", from = "src" }
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.pyright]
typeCheckingMode = "basic"
pythonVersion = "3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"